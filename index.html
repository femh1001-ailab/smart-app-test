<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <title>Example SMART App</title>
    <!-- 1. 引入 SMART on FHIR JS 函式庫 -->
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        /* 簡單的 CSS 讓 JSON 資料顯示得更好看 */
        #patient, #meds {
            font-family: Monaco, monospace;
            white-space: pre;
            font-size: 13px;
            height: 30vh;
            overflow: scroll;
            border: 1px solid #CCC;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h4>目前病患基本資料 (Current Patient)</h4>
    <div id="patient">載入中 (Loading...)</div>
    <br/>
    
    <h4>藥物處方 (Medications)</h4>
    <div id="meds">載入中 (Loading...)</div>

    <script type="text/javascript">
        // 2. FHIR.oauth2.ready() 會自動將網址上的授權碼換成 Access Token
        FHIR.oauth2.ready().then(function(client) {
            
            // 3. 取得目前上下文中的病患基本資料
            client.patient.read().then(
                function(pt) {
                    // 將取得的 JSON 資料格式化後顯示在畫面上
                    document.getElementById("patient").innerText = JSON.stringify(pt, null, 4);
                },
                function(error) {
                    document.getElementById("patient").innerText = error.stack;
                }
            );

            // 4. 進階應用：透過 client.request 查詢該病患的藥物處方
            client.request("/MedicationRequest?patient=" + client.patient.id, {
                resolveReferences: [ "medicationReference" ],
                graph: true
            })
            .then(function(data) {
                // 如果沒有找到藥物處方，拋出錯誤
                if (!data.entry || !data.entry.length) {
                    throw new Error("找不到該病患的藥物處方資料！");
                }
                return data.entry;
            })
            .then(
                function(meds) {
                    // 將藥物處方 JSON 資料顯示在畫面上
                    document.getElementById("meds").innerText = JSON.stringify(meds, null, 4);
                },
                function(error) {
                    document.getElementById("meds").innerText = error.stack;
                }
            );

        }).catch(console.error);
    </script>
</body>
</html>
